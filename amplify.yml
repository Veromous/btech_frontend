version: 1
applications:
  # ── Frontend (Vite / React) ──────────────────────────────────────────────────
  - appRoot: Frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - Frontend/node_modules/**/*

